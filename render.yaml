services:
  - type: web
    name: hydromesh-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: WEATHER_API_URL
        value: https://api.open-meteo.com/v1
      # Set these in Render dashboard → Environment tab:
      # DATABASE_URL = postgresql://postgres:Hydromesh%402025@db.zllbvvgufhhhktaxlpqp.supabase.co:5432/postgres
      # JWT_SECRET   = hydromesh_super_secret_key_2026
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
