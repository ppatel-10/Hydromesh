services:
  - type: web
    name: hydromesh-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: WEATHER_API_URL
        value: https://api.open-meteo.com/v1
      # Set these in Render dashboard (never commit secrets):
      # DATABASE_URL = postgresql://postgres.zllbvvgufhhhktaxlpqp:Hydromesh%402025@aws-0-eu-central-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      # JWT_SECRET   = <your secret>
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
