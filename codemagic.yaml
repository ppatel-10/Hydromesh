workflows:
  android-release:
    name: Hydromesh Android APK
    max_build_duration: 60
    environment:
      flutter: 3.41.4
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd mobile
          flutter pub get
      - name: Build release APK
        script: |
          cd mobile
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - thesaksham02@gmail.com
        notify:
          success: true
          failure: true
